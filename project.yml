name: Plex Library Analytics
options:
  bundleIdPrefix: com.plexanalytics
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Plex Library Analytics:
    type: application
    platform: macOS
    sources:
      - path: Plex Library Analytics
        excludes:
          - Resources
    resources:
      - path: Plex Library Analytics/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.plexanalytics.Plex-Library-Analytics
        INFOPLIST_FILE: Plex Library Analytics/Info.plist
        CODE_SIGN_ENTITLEMENTS: Plex Library Analytics/Plex_Library_Analytics.entitlements
        ENABLE_PREVIEWS: true
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        ICON_FILE: AppIcon
        COMBINE_HIDPI_IMAGES: true
        SWIFT_EMIT_LOC_STRINGS: true
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
    entitlements:
      path: Plex Library Analytics/Plex_Library_Analytics.entitlements
